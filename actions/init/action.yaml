name: "Terragrunt Init"
description: "Run Terragrunt init to initialise the repository"

inputs:
  account_id:
    description: "AWS Account ID"
    required: true
  aws-region:
    description: 'AWS Region for the State Bucket and Resources'
    default: eu-west-2
    required: false
    type: string
  github-environment:
    description: 'The name of your AWS environment. Create an environment secret called ACCOUNT_ID, also.'
    required: false
    default: 'placeholder'
    type: string
  role-to-assume:
    description: 'AWS Role name for OIDC'
    required: true
    type: string
  state-bucket:
    description: 'Name of the S3 bucket for Terraform State'
    required: true
    type: string
  state-dynamodb-table:
    description: 'Name of the DynamoDB table'
    required: false
    default: ''
    type: string
  state-key:
    description: "Where you want the state key to be"
    required: false
    type: string
    default: 'terraform.tfstate'
  terraform-version:
    description: 'Terraform version to use'
    required: false
    default: '1.7.0'
    type: string
  terragrunt-version:
    description: 'Terragrunt version to use'
    required: false
    default: '0.59.6'
    type: string
  working-directory:
    description: 'Directory containing main.tf'
    required: false
    default: '.'
    type: string

runs:
  using: composite
  steps:
    - uses: aws-actions/configure-aws-credentials@v4
      name: Configure AWS IdP Credentials
      with:
        role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/${{ inputs.role-to-assume }}
        role-session-name: GitHubActions
        retry-max-attempts: 5
        aws-region: ${{ inputs.aws-region }}

    - name: Bootstrap Terraform Backend
      id: bootstrap
      shell: bash
      env:
        BUCKET: ${{ inputs.state-bucket }}
        TABLE: ${{ inputs.state-dynamodb-table }}
        REGION: ${{ inputs.aws-region }}
      run: |
        echo "Does S3 bucket and DynamoDB table exist?"

        if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
          echo "S3 Bucket $BUCKET exists."
        else
          echo "S3 Bucket $BUCKET not found. Creating..."
          aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
          aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled --region $REGION
          echo "S3 Bucket created and versioning enabled."
        fi

        if [ -n "$TABLE" ]; then
          if aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" >/dev/null 2>&1; then
            echo "DynamoDB Table $TABLE exists."
          else
            echo "DynamoDB Table $TABLE not found. Creating..."
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST --region "$REGION"
            echo "DynamoDB Table created."
          fi
        else
          echo "No DynamoDB table name provided. Skipping DynamoDB creation."
        fi

    - name: Debug
      shell: bash
      run: |
        tree .

    - name: Terragrunt Init
      uses: gruntwork-io/terragrunt-action@v2
      with:
        tf_version: ${{ inputs.terraform-version }}
        tg_version: ${{ inputs.terragrunt-version }}
        tg_dir: ${{ inputs.working-directory }}
        tg_command: 'init -input=false'

    - name: Upload Terragrunt Folders
      uses: actions/upload-artifact@v4
      with:
        name: terragrunt-files
        path: |
          .terraform/
          .terraform.lock.hcl
        include-hidden-files: true
        if-no-files-found: error
