name: "Terraform Format"
description: "Terraform format checks"

inputs:
  working-directory:
    description: "Directory of the Terraform code"
    required: false
    default: "."
  terraform-version:
    description: "Terraform version to use"
    required: false
    default: "~1.7.0"

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Check Formatting
      shell: bash
      run: |
        DIFF_FILE="${{ github.workspace }}/fmt_diff.txt"
        cd "${{ inputs.working_directory }}"

        terraform fmt -recursive -diff -check 2>&1 | tee "$DIFF_FILE"
        
        if [ -s "$DIFF_FILE" ]; then
          echo "FMT_Outcome=failed" >> $GITHUB_ENV
        else
          echo "FMT_Outcome=success" >> $GITHUB_ENV
        fi

    # Generate summary for PR/Actions UI
    - name: Generate fmt Diff Summary
      if: always()
      shell: bash
      run: |
        DIFF_FILE="${{ github.workspace }}/fmt_diff.txt"
        echo "## Terraform FMT Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$FMT_Outcome" == "success" ]; then
          echo "✅ **Status:** Passed - No formatting issues detected" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status:** Failed - Formatting issues detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Click to expand diff</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cat "$DIFF_FILE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Configuration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Working Directory | \`${{ inputs.working-directory }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Terraform Version | \`${{ inputs.terraform-version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
