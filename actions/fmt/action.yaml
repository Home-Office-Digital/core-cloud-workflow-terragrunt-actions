name: "Terragrunt Format"
description: "Terragrunt format checks of HCL files"

inputs:
  terraform-version:
    description: "Terraform version to use"
    required: false
    default: "1.7.0"
  terragrunt-version:
    description: 'Terragrunt version to use'
    required: false
    default: '0.59.6'
    type: string
  working-directory:
    description: "Directory of the Terragrunt code"
    required: false
    default: "."


runs:
  using: "composite"
  steps:
    - name: Run Terragrunt hclfmt
      uses: gruntwork-io/terragrunt-action@v2
      with:
        tf_version: ${{ inputs.terraform-version }}
        tg_version: ${{ inputs.terragrunt-version }}
        tg_dir: ${{ inputs.working-directory }}
        tg_command: 'hclfmt'

    - name: Check Formatting and Generate Diff
      shell: bash
      run: |
        DIFF_FILE="${{ github.workspace }}/fmt_diff.txt"
        cd "${{ inputs.working-directory }}"
        git diff -- '*.hcl' ':(exclude).terraform.lock.hcl' > "$DIFF_FILE"
        if [ -s "$DIFF_FILE" ]; then
          echo "Formatting issues found."
          cat "$DIFF_FILE"
          echo "FMT_Outcome=failed" >> $GITHUB_ENV
          git checkout .
          exit 1
        else
          echo "No formatting issues found."
          echo "FMT_Outcome=success" >> $GITHUB_ENV
        fi

    # Generate summary for PR/Actions UI
    - name: Generate fmt Diff Summary
      if: always()
      shell: bash
      run: |
        DIFF_FILE="${{ github.workspace }}/fmt_diff.txt"
        echo "## Terraform FMT Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$FMT_Outcome" == "success" ]; then
          echo "✅ **Status:** Passed - No formatting issues detected" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status:** Failed - Formatting issues detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Click to expand diff</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cat "$DIFF_FILE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Configuration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Working Directory | \`${{ inputs.working-directory }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Terraform Version | \`${{ inputs.terraform-version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
