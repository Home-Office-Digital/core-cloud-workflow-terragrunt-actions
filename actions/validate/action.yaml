name: "Terragrunt Validate"
description: "Checks Terragrunt syntax and consistency"

inputs:
  github-environment:
    description: 'The name of your AWS environment. Create an environment secret called ACCOUNT_ID, also.'
    required: false
    default: 'placeholder'
    type: string
  terraform-version:
    description: "Terraform version to use"
    required: false
    default: "1.7.0"
  terragrunt-version:
    description: "Terragrunt version to use"
    required: false
    default: "0.59.6"
  working-directory:
    description: "Directory of the Terragrunt code"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Download Terragrunt Cache
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: terragrunt-files
        path: ${{ inputs.working-directory }}

    - name: Fix Binary Permissions
      shell: bash
      # This restores the +x bit that artifacts strip away
      run: |
        sudo chown -R $USER:$USER ${{ github.workspace }}
        sudo find ${{ github.workspace }} -type d -exec chmod 755 {} +
        echo "Searching for provider binaries to fix permissions..."
        sudo find ${{ github.workspace }} -name "terraform-provider-*" -type f -exec chmod +x {} \;
        echo "Permissions restoration complete."

    - name: Terragrunt Validate
      id: tg_validate
      uses: gruntwork-io/terragrunt-action@v2
      with:
        tf_version: ${{ inputs.terraform-version }}
        tg_version: ${{ inputs.terragrunt-version }}
        tg_dir: ${{ inputs.working-directory }}
        tg_command: 'validate'
      env:
        env_name: ${{ inputs.github-environment }}
        TERRAGRUNT_DOWNLOAD: .terragrunt-cache

    - name: Capture and Decode Output
      shell: bash
      if: always()
      env:
        RAW_LOG: ${{ steps.tg_validate.outputs.tg_action_output }}
      run: |
        python3 -c "import sys, urllib.parse, os; print(urllib.parse.unquote(os.environ['RAW_LOG']))" > validate.txt

        sed -i 's/\\M-b\\M-\^U\\M-7//g' validate.txt 2>/dev/null || true

        if [ "${{ steps.tg_validate.outcome }}" == "success" ]; then
          echo "Validate_Outcome=success" >> $GITHUB_ENV
        else
          echo "Validate_Outcome=failed" >> $GITHUB_ENV
        fi

    # Generate summary for PR/Actions UI
    - name: Generate Validate Summary
      if: always()
      shell: bash
      run: |
        VALIDATE_FILE="validate.txt"
        echo "## Terragrunt Validate Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$Validate_Outcome" == "success" ]; then
          echo "✅ **Status:** Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status:** Failed" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "<details><summary>Click to view logs</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```hcl' >> $GITHUB_STEP_SUMMARY
        cat "$VALIDATE_FILE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY 
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Configuration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Working Directory | \`${{ inputs.working-directory }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Terraform Version | \`${{ inputs.terraform-version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Terragrunt Version | \`${{ inputs.terragrunt-version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Github Environment | \`${{ inputs.github-environment }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
