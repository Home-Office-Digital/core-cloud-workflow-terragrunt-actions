name: "Terragrunt Validate"
description: "Checks Terragrunt syntax and consistency"

inputs:
  terraform-version:
    description: "Terraform version to use"
    required: false
    default: "1.7.0"
  terragrunt-version:
    description: "Terragrunt version to use"
    required: false
    default: "0.59.6"
  working-directory:
    description: "Directory of the Terragrunt code"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Download Terragrunt Cache
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: terragrunt-files
        path: .

    - name: Fix Binary Permissions
      shell: bash
      # This restores the +x bit that artifacts strip away
      run: |
        if [ -d ".terragrunt-cache" ]; then
          echo "Found .terragrunt-cache, restoring provider permissions..."
          find . -name "terraform-provider-*" -type f -exec chmod +x {} \;
        else
          echo "No .terragrunt-cache found."
        fi

    - name: Terragrunt Validate
      id: tg_validate
      uses: gruntwork-io/terragrunt-action@v2
      continue-on-error: true
      with:
        tf_version: ${{ inputs.terraform-version }}
        tg_version: ${{ inputs.terragrunt-version }}
        tg_dir: ${{ inputs.working-directory }}
        tg_command: 'validate --terragrunt-no-auto-init'
      env:
        env_name: ${{ inputs.github-environment }}
        TERRAGRUNT_DOWNLOAD: .terragrunt-cache

    - name: Capture Output for Summary
      shell: bash
      if: always()
      run: |
        if [ -z "${{ steps.tg_validate.outputs.tg_action_output }}" ]; then
          echo "Validation failed with the following errors (captured from logs):" > validate.txt
          echo "------------------------------------------------------------" >> validate.txt
          echo "Check the 'Terragrunt Validate' step logs for the full trace." >> validate.txt
          echo "Common causes: HCL syntax errors or missing provider cache." >> validate.txt
        else
          echo "${{ steps.tg_validate.outputs.tg_action_output }}" > validate.txt
        fi

        if [ "${{ steps.tg_validate.outcome }}" == "success" ]; then
          echo "Validate_Outcome=success" >> $GITHUB_ENV
        else
          echo "Validate_Outcome=failed" >> $GITHUB_ENV
        fi

    # Generate summary for PR/Actions UI
    - name: Generate Validate Summary
      if: always()
      shell: bash
      run: |
        VALIDATE_FILE="validate.txt"
        echo "## Terragrunt Validate Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$Validate_Outcome" == "success" ]; then
          echo "✅ **Status:** Passed - No validation issues detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Click to expand for any warnings</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```warnings' >> $GITHUB_STEP_SUMMARY
          cat "$VALIDATE_FILE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status:** Failed - Validation issues detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Click to expand for errors and warnings</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```warnings' >> $GITHUB_STEP_SUMMARY
          cat "$VALIDATE_FILE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Configuration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Working Directory | \`${{ inputs.working-directory }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Terraform Version | \`${{ inputs.terraform-version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Terragrunt Version | \`${{ inputs.terragrunt-version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
