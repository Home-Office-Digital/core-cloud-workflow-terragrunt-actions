name: "Terragrunt Apply"
description: "Downloads the plan file arifacts and applies them"

inputs:
  account_id:
    description: "AWS Account ID"
    required: true
  apply-branch:
    description: 'If you want to apply resources to a branch that is not main'
    required: false
    type: string
    default: 'main'
  aws-region:
    description: 'AWS Region for the State Bucket and Resources'
    default: eu-west-2
    required: false
    type: string
  github-environment:
    description: 'The name of your AWS environment. Create an environment secret called ACCOUNT_ID, also.'
    required: false
    default: 'placeholder'
    type: string
  role-to-assume:
    description: 'AWS Role name for OIDC'
    required: true
    type: string
  terraform-version:
    description: 'Terraform version to use'
    required: false
    default: '1.7.0'
    type: string
  terragrunt-version:
    description: "Terragrunt version to use"
    required: false
    default: "0.59.6"
  working-directory:
    description: "Directory of the Terragrunt code"
    required: false
    default: "."

runs:
  using: composite
  steps:
    - uses: aws-actions/configure-aws-credentials@v4
      name: Configure AWS IdP Credentials
      with:
        role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/${{ inputs.role-to-assume }}
        role-session-name: GitHubActions
        retry-max-attempts: 5
        aws-region: ${{ inputs.aws-region }}

    - name: Download Plan Binary
      uses: actions/download-artifact@v4
      with:
        name: terragrunt-plan-files
        path: ${{ inputs.working-directory }}

    - name: Fix Permissions
      shell: bash
      run: |
        sudo chown -R $USER:$USER ${{ github.workspace }}
        sudo find ${{ github.workspace }} -type d -exec chmod 755 {} +
        echo "Searching for provider binaries to fix permissions..."
        sudo find ${{ github.workspace }} -name "terraform-provider-*" -type f -exec chmod +x {} \;
        echo "Permissions restoration complete."

    - name: Fix Binary Permissions
      shell: bash
      run: |
        if [ -d ".terraform/providers" ]; then
          find .terraform/providers -type f -exec chmod +x {} \;
        fi

    - name: Debug File Structure
      shell: bash
      run: find ${{ inputs.working-directory }} -name "tfplan"

    - name: Run Terragrunt Apply for All Users
      id: apply
      uses: gruntwork-io/terragrunt-action@v2
      with:
        tf_version: ${{ inputs.terraform-version }}
        tg_version: ${{ inputs.terragrunt-version }}
        tg_dir: ${{ inputs.working-directory }}/${{ inputs.working-directory }}
        tg_command: 'run-all apply tfplan'
